<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventario de Sevilla{% endblock %}</title>
</head>
<body>

    <nav>
        <a href="{% url 'arbol_lista' %}">arboles</a>
        <a href="{% url 'alcorque_lista' %}">alcorques</a>
        <a href="{% url 'incidencia_lista' %}">incidencias</a>
        <a href="{% url 'nueva_incidencia' %}">nueva incidencia</a>
        {% if user.is_authenticated %}
            <a href="{% url 'logout' %}">logout</a>
        {% else %}
            <a href="{% url 'login' %}">login</a>
        {% endif %}

    </nav>

    {% if messages %}
        <div>
            {% for m in messages %}
                <p class="{{ m.tags }}">{{ m }}</p>
            {% endfor %}
        </div>
    {% endif %}
    


    <main>
        {% block content %}{% endblock %}
    </main>

</body>
</html>
