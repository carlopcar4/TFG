{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Arbolado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'core/styles.css' %}">
</head>

<body>
    <header class="navbar navbar-expand-lg navbar-dark bg-verde">
        <div class="container-fluid">
            <a href="{% url 'inicio' %}" class="navbar-brand fw-bold">Inventario arbolado</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContenido">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContenido">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-lg-2">
                    {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a href="{% url 'listarIncidencias' %}" class="nav-link">Incidencias</a>
                    </li>
                    {% endif %}
                </ul>
                <div class="navbar-nav ms-lg-auto gap-lg-2 align-items-start">
                    {% if user.is_authenticated %}
                    <a class="nav-link" href="{% url 'perfil' %}">{{ user.username }}</a>
                    <a class="nav-link" href="{% url 'notificaciones' %}"><i class="bi bi-bell"></i></a>
                    <form action="{% url 'cerrarSesion' %}" method="post" class="m-0">
                        {% csrf_token %}
                        <button type="submit" class="nav-link">Cerrar sesión</button>
                    </form>
                    {% else %}
                    <a class="nav-link" href="{% url 'registro' %}" class="btn">Regístrate</a>
                    <a class="nav-link" href="{% url 'login' %}" class="btn">Inicia sesión</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
